<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MacroBot – GSEM</title>
  <link rel="icon" type="image/jpeg" href="/static/macrobot.jpg" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="dark-chat">
  <div class="chat-layout">

    <!-- Header -->
    <header class="chat-header">
      <img src="/static/logo.jpg" alt="GSEM" />
      <span class="title">MacroBot – GSEM</span>

      <div class="lang-toggle">
        <button class="lang-btn active" id="btn-fr" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
      </div>

      <div class="lang-toggle" id="mode-toggle">
        <button class="lang-btn active" id="btn-direct" onclick="setMode('direct')">—</button>
        <button class="lang-btn" id="btn-guide" onclick="setMode('guide')">—</button>
      </div>

      <button class="btn-icon" id="logout-btn" onclick="logout()">—</button>
    </header>

    <!-- Messages -->
    <main class="chat-messages" id="chat-messages">
      <!-- Welcome message injected by JS -->
    </main>

    <!-- Input -->
    <footer class="chat-input-area">
      <div class="input-row">
        <textarea
          class="chat-input"
          id="chat-input"
          rows="1"
          placeholder="—"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">—</button>
      </div>
      <p class="lang-banner" id="lang-banner">—</p>
    </footer>

  </div>

  <script>
    // ── i18n ────────────────────────────────────────────────────────────────
    const t = {
      fr: {
        logout: "Déconnexion",
        placeholder: "Posez votre question…",
        send: "Envoyer",
        banner_direct: "Mode Français · Réponses directes",
        banner_guide:  "Mode Français · Pédagogue — guidage socratique",
        mode_direct: "Direct",
        mode_guide:  "Pédagogue",
        welcome_direct: "Bonjour ! Je suis MacroBot, votre assistant GSEM. Posez-moi une question sur les documents du cours et je vous répondrai directement.",
        welcome_guide:  "Bonjour ! Je suis en mode Pédagogue. Je ne vous donnerai pas les réponses directement — je vous guiderai par des questions pour que vous les trouviez vous-même.",
        thinking: "Réflexion en cours…",
        error: "Une erreur s'est produite. Veuillez réessayer.",
        session_expired: "Session expirée. Redirection vers la page de connexion…",
      },
      en: {
        logout: "Logout",
        placeholder: "Ask your question…",
        send: "Send",
        banner_direct: "English Mode · Direct answers",
        banner_guide:  "English Mode · Guide — Socratic questioning",
        mode_direct: "Direct",
        mode_guide:  "Guide",
        welcome_direct: "Hello! I am MacroBot, your GSEM assistant. Ask me anything about the course materials and I will answer directly.",
        welcome_guide:  "Hello! I am in Guide mode. I won't give you answers directly — I will ask questions and give hints to help you find them yourself.",
        thinking: "Thinking…",
        error: "An error occurred. Please try again.",
        session_expired: "Session expired. Redirecting to login…",
      },
    };

    // ── State ────────────────────────────────────────────────────────────────
    let lang = localStorage.getItem("gsem_lang") || "fr";
    let mode = localStorage.getItem("gsem_mode") || "direct";
    let history = [];   // [{role, content}] — clean turns only
    let waiting = false;

    const token = localStorage.getItem("gsem_token");
    if (!token) window.location.href = "/";

    // ── Boot ─────────────────────────────────────────────────────────────────
    window.addEventListener("DOMContentLoaded", () => {
      applyLang(lang);
      applyMode(mode);
      appendWelcome();
    });

    // ── Language ─────────────────────────────────────────────────────────────
    function setLang(l) {
      if (l === lang) return;
      lang = l;
      localStorage.setItem("gsem_lang", l);
      applyLang(l);
      // Clear conversation when switching language
      history = [];
      document.getElementById("chat-messages").innerHTML = "";
      appendWelcome();
    }

    function applyLang(l) {
      const tx = t[l];
      document.getElementById("btn-fr").classList.toggle("active", l === "fr");
      document.getElementById("btn-en").classList.toggle("active", l === "en");
      document.getElementById("logout-btn").textContent = tx.logout;
      document.getElementById("chat-input").placeholder = tx.placeholder;
      document.getElementById("send-btn").textContent = tx.send;
      document.getElementById("lang-banner").textContent = tx[mode === "guide" ? "banner_guide" : "banner_direct"];
      document.documentElement.lang = l;
    }

    // ── Mode ──────────────────────────────────────────────────────────────────
    function setMode(m) {
      if (m === mode) return;
      mode = m;
      localStorage.setItem("gsem_mode", m);
      applyMode(m);
      history = [];
      document.getElementById("chat-messages").innerHTML = "";
      appendWelcome();
    }

    function applyMode(m) {
      const tx = t[lang];
      document.getElementById("btn-direct").classList.toggle("active", m === "direct");
      document.getElementById("btn-guide").classList.toggle("active", m === "guide");
      document.getElementById("btn-direct").textContent = tx.mode_direct;
      document.getElementById("btn-guide").textContent = tx.mode_guide;
      document.getElementById("lang-banner").textContent = tx[m === "guide" ? "banner_guide" : "banner_direct"];
    }

    // ── Auth ─────────────────────────────────────────────────────────────────
    function logout() {
      localStorage.removeItem("gsem_token");
      localStorage.removeItem("gsem_lang");
      window.location.href = "/";
    }

    // ── Message rendering ─────────────────────────────────────────────────────
    function appendWelcome() {
      const key = mode === "guide" ? "welcome_guide" : "welcome_direct";
      appendMessage("assistant", t[lang][key], []);
    }

    function appendMessage(role, content, sources) {
      const container = document.getElementById("chat-messages");

      const row = document.createElement("div");
      row.className = `msg-row ${role}`;

      const avatar = document.createElement("div");
      avatar.className = "msg-avatar";
      if (role === "user") {
        avatar.textContent = "You";
      } else {
        const img = document.createElement("img");
        img.src = "/static/macrobot.jpg";
        img.alt = "MacroBot";
        img.onerror = () => { avatar.textContent = "AI"; img.remove(); };
        avatar.appendChild(img);
      }

      const bubble = document.createElement("div");
      bubble.className = "msg-bubble";
      bubble.textContent = content;


      row.appendChild(avatar);
      row.appendChild(bubble);
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
      return bubble;
    }

    function appendTyping() {
      const container = document.getElementById("chat-messages");
      const row = document.createElement("div");
      row.className = "msg-row assistant";
      row.id = "typing-row";

      const avatar = document.createElement("div");
      avatar.className = "msg-avatar";
      avatar.textContent = "AI";

      const bubble = document.createElement("div");
      bubble.className = "msg-bubble";
      bubble.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

      row.appendChild(avatar);
      row.appendChild(bubble);
      container.appendChild(row);
      container.scrollTop = container.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById("typing-row");
      if (el) el.remove();
    }

    function formatType(type) {
      const map = {
        slides: "Slides",
        textbooks: "Textbook",
        problem_sets: "Problem Set",
        exams: "Exam",
      };
      return map[type] || type;
    }

    // ── Input helpers ─────────────────────────────────────────────────────────
    function handleKey(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 160) + "px";
    }

    // ── Send ──────────────────────────────────────────────────────────────────
    async function sendMessage() {
      if (waiting) return;
      const input = document.getElementById("chat-input");
      const message = input.value.trim();
      if (!message) return;

      input.value = "";
      input.style.height = "auto";
      waiting = true;
      document.getElementById("send-btn").disabled = true;

      // Show user message
      appendMessage("user", message, []);

      // Show typing indicator
      appendTyping();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`,
          },
          body: JSON.stringify({ message, language: lang, mode, history }),
        });

        removeTyping();

        if (res.status === 401) {
          alert(t[lang].session_expired);
          logout();
          return;
        }

        if (!res.ok) {
          appendMessage("assistant", t[lang].error, []);
        } else {
          const data = await res.json();
          appendMessage("assistant", data.reply, data.sources);

          // Store clean turns in history
          history.push({ role: "user", content: message });
          history.push({ role: "assistant", content: data.reply });

          // Keep history to last 10 turns to avoid token bloat
          if (history.length > 20) history = history.slice(-20);
        }
      } catch {
        removeTyping();
        appendMessage("assistant", t[lang].error, []);
      }

      waiting = false;
      document.getElementById("send-btn").disabled = false;
      input.focus();
    }
  </script>
</body>
</html>
